<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="840" viewBox="0 0 1500 840">
  <title>Fault Tolerance and Observability</title>
  <desc>Editable SVG showing registry failover, MCP timeout handling, partial result aggregation, and network observability.</desc>
  <rect width="1500" height="840" fill="#ffffff"/>
  <text x="58" y="70" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700" fill="#102033">Reliability &amp; Observability in the Communication Network</text>
  <text x="58" y="108" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#53616f">Timeouts, standard error frames, registry failover, packet logs, and topology visualization keep the demo explainable</text>

  <rect x="70" y="150" width="640" height="250" rx="10" fill="#f7fafc" stroke="#d8e0e8" stroke-width="2"/>
  <text x="104" y="192" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#102033">Scenario A: Registry Failover</text>
  <rect x="118" y="238" width="150" height="66" rx="8" fill="#e9f7fb" stroke="#148ba5" stroke-width="2"/>
  <text x="193" y="278" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700" fill="#102033">Coordinator</text>
  <rect x="382" y="214" width="150" height="58" rx="8" fill="#fff0f0" stroke="#c84a4a" stroke-width="2"/>
  <text x="457" y="250" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" fill="#102033">Primary Registry</text>
  <rect x="382" y="312" width="150" height="58" rx="8" fill="#ffffff" stroke="#8da0b4" stroke-width="2"/>
  <text x="457" y="348" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" fill="#102033">Backup Registry</text>
  <line x1="268" y1="258" x2="372" y2="240" stroke="#c84a4a" stroke-width="3" stroke-dasharray="8 6"/>
  <polygon points="372,240 355,235 358,253" fill="#c84a4a"/>
  <text x="320" y="231" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#c84a4a">discover error</text>
  <line x1="268" y1="286" x2="372" y2="335" stroke="#148ba5" stroke-width="3"/>
  <polygon points="372,335 355,335 362,319" fill="#148ba5"/>
  <text x="318" y="327" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#148ba5">fallback lookup</text>
  <text x="578" y="259" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="38" font-weight="700" fill="#c84a4a">X</text>
  <text x="588" y="348" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#53616f">task continues</text>

  <rect x="790" y="150" width="640" height="250" rx="10" fill="#f7fafc" stroke="#d8e0e8" stroke-width="2"/>
  <text x="824" y="192" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#102033">Scenario B: MCP Failure</text>
  <rect x="838" y="250" width="136" height="62" rx="8" fill="#e9f7fb" stroke="#148ba5" stroke-width="2"/>
  <text x="906" y="287" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" fill="#102033">Agent</text>
  <rect x="1044" y="250" width="150" height="62" rx="8" fill="#fff7eb" stroke="#d9861c" stroke-width="2"/>
  <text x="1119" y="287" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" fill="#102033">MCP Gateway</text>
  <rect x="1264" y="250" width="126" height="62" rx="8" fill="#fff0f0" stroke="#c84a4a" stroke-width="2"/>
  <text x="1327" y="287" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" fill="#102033">MCP Server</text>
  <line x1="974" y1="281" x2="1034" y2="281" stroke="#148ba5" stroke-width="3"/>
  <polygon points="1034,281 1018,272 1018,290" fill="#148ba5"/>
  <line x1="1194" y1="281" x2="1254" y2="281" stroke="#c84a4a" stroke-width="3" stroke-dasharray="8 6"/>
  <polygon points="1254,281 1238,272 1238,290" fill="#c84a4a"/>
  <text x="1223" y="260" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#c84a4a">timeout</text>
  <line x1="1119" y1="312" x2="1119" y2="355" stroke="#d9861c" stroke-width="3"/>
  <polygon points="1119,355 1110,339 1128,339" fill="#d9861c"/>
  <text x="1198" y="344" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#53616f">circuit opens after failures</text>
  <text x="900" y="350" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#53616f">standard error result</text>
  <text x="900" y="372" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#53616f">Coordinator marks task partial</text>

  <rect x="70" y="462" width="430" height="260" rx="10" fill="#ffffff" stroke="#d8e0e8" stroke-width="2"/>
  <text x="104" y="505" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#102033">Packet Log</text>
  <rect x="104" y="536" width="360" height="34" rx="5" fill="#f7fafc" stroke="#d8e0e8" stroke-width="1.5"/>
  <text x="124" y="558" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#53616f">registry_discover_request  coordinator -&gt; primary</text>
  <rect x="104" y="582" width="360" height="34" rx="5" fill="#fff0f0" stroke="#efb6b6" stroke-width="1.5"/>
  <text x="124" y="604" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#a93636">registry_discover_error    primary -&gt; coordinator</text>
  <rect x="104" y="628" width="360" height="34" rx="5" fill="#f7fafc" stroke="#d8e0e8" stroke-width="1.5"/>
  <text x="124" y="650" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#53616f">a2a_task_request           coordinator -&gt; agent</text>
  <rect x="104" y="674" width="360" height="34" rx="5" fill="#f7fafc" stroke="#d8e0e8" stroke-width="1.5"/>
  <text x="124" y="696" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#53616f">gateway_cache_hit          mcp_gateway internal</text>

  <rect x="535" y="462" width="430" height="260" rx="10" fill="#ffffff" stroke="#d8e0e8" stroke-width="2"/>
  <text x="569" y="505" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#102033">Topology UI</text>
  <circle cx="645" cy="592" r="34" fill="#e9f7fb" stroke="#148ba5" stroke-width="2"/>
  <text x="645" y="597" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" fill="#102033">Coord</text>
  <circle cx="780" cy="540" r="28" fill="#f3fbfd" stroke="#148ba5" stroke-width="2"/>
  <text x="780" y="545" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700" fill="#102033">Agent</text>
  <circle cx="835" cy="650" r="30" fill="#fff7eb" stroke="#d9861c" stroke-width="2"/>
  <text x="835" y="655" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700" fill="#102033">Gate</text>
  <circle cx="718" cy="683" r="24" fill="#fff0f0" stroke="#c84a4a" stroke-width="2"/>
  <text x="718" y="688" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700" fill="#102033">MCP</text>
  <line x1="675" y1="580" x2="755" y2="552" stroke="#148ba5" stroke-width="3"/>
  <line x1="800" y1="562" x2="826" y2="620" stroke="#d9861c" stroke-width="3"/>
  <line x1="806" y1="655" x2="742" y2="677" stroke="#c84a4a" stroke-width="3" stroke-dasharray="8 6"/>
  <text x="725" y="732" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#53616f">normal links, failed links, live node states</text>

  <rect x="1000" y="462" width="430" height="260" rx="10" fill="#ffffff" stroke="#d8e0e8" stroke-width="2"/>
  <text x="1034" y="505" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#102033">Trace &amp; Result Semantics</text>
  <rect x="1034" y="536" width="156" height="58" rx="7" fill="#f7fafc" stroke="#d8e0e8" stroke-width="1.5"/>
  <text x="1112" y="571" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" fill="#102033">trace_id</text>
  <rect x="1238" y="536" width="156" height="58" rx="7" fill="#f7fafc" stroke="#d8e0e8" stroke-width="1.5"/>
  <text x="1316" y="571" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" fill="#102033">span_id</text>
  <line x1="1190" y1="565" x2="1228" y2="565" stroke="#148ba5" stroke-width="2.5"/>
  <polygon points="1228,565 1214,557 1214,573" fill="#148ba5"/>
  <text x="1215" y="628" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#53616f">Every network hop is linkable</text>
  <text x="1215" y="658" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#53616f">completed / partial / failed</text>
  <text x="1215" y="688" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#53616f">standard error payloads preserve liveness</text>
</svg>
