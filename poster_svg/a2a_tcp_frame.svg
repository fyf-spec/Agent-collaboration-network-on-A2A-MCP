<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760">
  <title>A2A TCP Length-Prefix Frame</title>
  <desc>Editable SVG explaining the custom A2A TCP frame and receive workflow.</desc>
  <rect width="1400" height="760" fill="#ffffff"/>
  <text x="56" y="70" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700" fill="#102033">A2A TCP: Length-Prefix JSON Frame</text>
  <text x="56" y="108" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#53616f">Solves TCP stream boundary issues with recv_exact(4) + recv_exact(length)</text>

  <rect x="70" y="160" width="220" height="108" rx="8" fill="#e9f7fb" stroke="#148ba5" stroke-width="2.5"/>
  <text x="180" y="200" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#102033">Coordinator</text>
  <text x="180" y="230" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#53616f">send TASK_REQUEST</text>

  <rect x="1110" y="160" width="220" height="108" rx="8" fill="#f3fbfd" stroke="#148ba5" stroke-width="2.5"/>
  <text x="1220" y="200" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#102033">Worker Agent</text>
  <text x="1220" y="230" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#53616f">recv frame + ACK</text>

  <line x1="290" y1="214" x2="1100" y2="214" stroke="#294766" stroke-width="3"/>
  <polygon points="1100,214 1084,205 1084,223" fill="#294766"/>
  <text x="700" y="195" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#294766">raw TCP byte stream</text>

  <rect x="250" y="326" width="900" height="96" rx="8" fill="#ffffff" stroke="#294766" stroke-width="2.5"/>
  <rect x="250" y="326" width="210" height="96" rx="8" fill="#fff7eb" stroke="#d9861c" stroke-width="2.5"/>
  <line x1="460" y1="326" x2="460" y2="422" stroke="#294766" stroke-width="2.5"/>
  <text x="355" y="366" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#102033">Length</text>
  <text x="355" y="394" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#53616f">4 bytes, big endian</text>
  <text x="805" y="366" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#102033">UTF-8 JSON Payload</text>
  <text x="805" y="394" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#53616f">A2A envelope, variable length, max 4 MiB</text>

  <rect x="90" y="500" width="250" height="80" rx="8" fill="#f7fafc" stroke="#d8e0e8" stroke-width="2"/>
  <text x="215" y="533" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#102033">1. recv_exact(4)</text>
  <text x="215" y="560" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#53616f">read frame size</text>

  <rect x="405" y="500" width="250" height="80" rx="8" fill="#f7fafc" stroke="#d8e0e8" stroke-width="2"/>
  <text x="530" y="533" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#102033">2. parse length</text>
  <text x="530" y="560" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#53616f">unsigned network order</text>

  <rect x="720" y="500" width="250" height="80" rx="8" fill="#f7fafc" stroke="#d8e0e8" stroke-width="2"/>
  <text x="845" y="533" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#102033">3. recv_exact(length)</text>
  <text x="845" y="560" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#53616f">reassemble full JSON body</text>

  <rect x="1035" y="500" width="250" height="80" rx="8" fill="#f7fafc" stroke="#d8e0e8" stroke-width="2"/>
  <text x="1160" y="533" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#102033">4. validate envelope</text>
  <text x="1160" y="560" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#53616f">ACK, result, or ERROR</text>

  <line x1="340" y1="540" x2="395" y2="540" stroke="#148ba5" stroke-width="2.5"/>
  <polygon points="395,540 381,532 381,548" fill="#148ba5"/>
  <line x1="655" y1="540" x2="710" y2="540" stroke="#148ba5" stroke-width="2.5"/>
  <polygon points="710,540 696,532 696,548" fill="#148ba5"/>
  <line x1="970" y1="540" x2="1025" y2="540" stroke="#148ba5" stroke-width="2.5"/>
  <polygon points="1025,540 1011,532 1011,548" fill="#148ba5"/>

  <rect x="78" y="642" width="1244" height="68" rx="8" fill="#ffffff" stroke="#d8e0e8" stroke-width="2"/>
  <text x="110" y="684" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#102033">Envelope fields:</text>
  <text x="285" y="684" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#53616f">version</text>
  <text x="375" y="684" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#53616f">type</text>
  <text x="445" y="684" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#53616f">trace_id</text>
  <text x="545" y="684" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#53616f">span_id</text>
  <text x="645" y="684" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#53616f">source</text>
  <text x="735" y="684" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#53616f">target</text>
  <text x="825" y="684" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#53616f">task_id</text>
  <text x="920" y="684" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#53616f">deadline_ms</text>
  <text x="1065" y="684" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#53616f">payload</text>
  <text x="1160" y="684" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#53616f">ERROR frame</text>
</svg>
