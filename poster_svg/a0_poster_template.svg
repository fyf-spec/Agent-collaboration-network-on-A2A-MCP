<svg xmlns="http://www.w3.org/2000/svg" width="1189mm" height="841mm" viewBox="0 0 1189 841">
  <title>A0 Landscape Poster Template for Governed A2A-MCP Network</title>
  <desc>Editable A0 landscape SVG poster scaffold with reserved header, title area, author area, logo slot, and academic poster body grid.</desc>
  <rect width="1189" height="841" fill="#ffffff"/>

  <!-- Header reserved for title, authors, affiliation, and logo -->
  <rect x="0" y="0" width="1189" height="118" fill="#ffffff"/>
  <rect x="28" y="26" width="70" height="70" rx="4" fill="#f7fafc" stroke="#cbd6e2" stroke-width="1.4" stroke-dasharray="5 4"/>
  <text x="63" y="65" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#8da0b4">LOGO</text>
  <text x="126" y="48" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#102033">A Governed A2A-MCP Communication Network for Distributed Multi-Agent Travel Planning</text>
  <text x="126" y="78" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#53616f">Authors: Feng Yufan, Xu Rixi, Yu Anheng, Wu Ningkai    |    Computer Networking Course Project</text>
  <rect x="1028" y="30" width="126" height="54" rx="4" fill="#f7fafc" stroke="#cbd6e2" stroke-width="1.2" stroke-dasharray="5 4"/>
  <text x="1091" y="61" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#8da0b4">COURSE / QR</text>
  <line x1="28" y1="118" x2="1161" y2="118" stroke="#d8e0e8" stroke-width="1.6"/>

  <!-- Column guides and section cards -->
  <rect x="28" y="140" width="332" height="648" rx="6" fill="#f7fafc" stroke="#d8e0e8" stroke-width="1.4"/>
  <rect x="378" y="140" width="433" height="648" rx="6" fill="#ffffff" stroke="#d8e0e8" stroke-width="1.4"/>
  <rect x="829" y="140" width="332" height="648" rx="6" fill="#f7fafc" stroke="#d8e0e8" stroke-width="1.4"/>

  <text x="50" y="172" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700" fill="#102033">1. Problem &amp; Course Targets</text>
  <rect x="50" y="192" width="288" height="86" rx="5" fill="#ffffff" stroke="#d8e0e8" stroke-width="1"/>
  <text x="66" y="220" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#53616f">A2A multi-agent networking</text>
  <text x="66" y="240" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#53616f">HTTP/JSON-RPC MCP tool servers</text>
  <text x="66" y="260" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#53616f">TCP application-layer protocol design</text>

  <text x="50" y="318" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700" fill="#102033">2. Four-Plane Design</text>
  <rect x="50" y="338" width="288" height="48" rx="5" fill="#e9f7fb" stroke="#148ba5" stroke-width="1"/>
  <text x="66" y="367" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700" fill="#102033">Data Plane: A2A TCP dispatch</text>
  <rect x="50" y="399" width="288" height="48" rx="5" fill="#ffffff" stroke="#8da0b4" stroke-width="1"/>
  <text x="66" y="428" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700" fill="#102033">Control Plane: registry discovery</text>
  <rect x="50" y="460" width="288" height="48" rx="5" fill="#fff7eb" stroke="#d9861c" stroke-width="1"/>
  <text x="66" y="489" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700" fill="#102033">Governance Plane: MCP Gateway</text>
  <rect x="50" y="521" width="288" height="48" rx="5" fill="#ffffff" stroke="#d8e0e8" stroke-width="1"/>
  <text x="66" y="550" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700" fill="#102033">Observability Plane: logs + metrics</text>

  <text x="50" y="620" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700" fill="#102033">3. Contributions</text>
  <rect x="50" y="640" width="288" height="116" rx="5" fill="#ffffff" stroke="#d8e0e8" stroke-width="1"/>
  <text x="66" y="668" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#53616f">Length-prefix TCP A2A protocol</text>
  <text x="66" y="690" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#53616f">Primary-backup registry failover</text>
  <text x="66" y="712" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#53616f">Gateway cache, coalescing, limits, breaker</text>
  <text x="66" y="734" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#53616f">Packet-level UI and traceable network events</text>

  <!-- Center architecture placeholder -->
  <text x="400" y="172" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700" fill="#102033">System Architecture</text>
  <rect x="400" y="192" width="389" height="410" rx="5" fill="#ffffff" stroke="#d8e0e8" stroke-width="1"/>
  <rect x="430" y="230" width="84" height="42" rx="4" fill="#ffffff" stroke="#294766" stroke-width="1.3"/>
  <text x="472" y="256" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="9" font-weight="700" fill="#102033">User</text>
  <rect x="552" y="220" width="118" height="62" rx="4" fill="#e9f7fb" stroke="#148ba5" stroke-width="1.3"/>
  <text x="611" y="255" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="700" fill="#102033">Coordinator</text>
  <rect x="704" y="214" width="62" height="30" rx="4" fill="#ffffff" stroke="#8da0b4" stroke-width="1"/>
  <text x="735" y="233" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="7" fill="#53616f">Registry</text>
  <rect x="704" y="258" width="62" height="30" rx="4" fill="#ffffff" stroke="#8da0b4" stroke-width="1"/>
  <text x="735" y="277" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="7" fill="#53616f">Backup</text>
  <rect x="444" y="348" width="160" height="176" rx="5" fill="#f3fbfd" stroke="#148ba5" stroke-width="1.2"/>
  <text x="524" y="372" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="700" fill="#102033">Agent Pool</text>
  <text x="524" y="398" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="8" fill="#53616f">Weather / Attraction</text>
  <text x="524" y="420" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="8" fill="#53616f">Hotel / Traffic / Packing</text>
  <rect x="648" y="382" width="118" height="74" rx="5" fill="#fff7eb" stroke="#d9861c" stroke-width="1.4"/>
  <text x="707" y="413" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="700" fill="#102033">MCP Gateway</text>
  <text x="707" y="433" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="7" fill="#53616f">cache / breaker / metrics</text>
  <rect x="650" y="500" width="112" height="46" rx="4" fill="#ffffff" stroke="#8da0b4" stroke-width="1"/>
  <text x="706" y="527" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="8" fill="#53616f">MCP Servers</text>
  <line x1="514" y1="251" x2="544" y2="251" stroke="#294766" stroke-width="1.4"/>
  <polygon points="544,251 536,247 536,255" fill="#294766"/>
  <line x1="611" y1="282" x2="524" y2="338" stroke="#148ba5" stroke-width="1.4"/>
  <polygon points="524,338 529,329 533,336" fill="#148ba5"/>
  <line x1="604" y1="436" x2="640" y2="420" stroke="#d9861c" stroke-width="1.4"/>
  <polygon points="640,420 632,417 635,426" fill="#d9861c"/>
  <line x1="707" y1="456" x2="707" y2="492" stroke="#d9861c" stroke-width="1.4"/>
  <polygon points="707,492 702,484 712,484" fill="#d9861c"/>

  <text x="400" y="642" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700" fill="#102033">Demo Pipeline</text>
  <rect x="400" y="664" width="389" height="74" rx="5" fill="#f7fafc" stroke="#d8e0e8" stroke-width="1"/>
  <text x="421" y="706" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#53616f">Submit query -> Dynamic DAG -> A2A TCP -> MCP Gateway -> Agent results -> final plan</text>

  <text x="851" y="172" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700" fill="#102033">Protocol &amp; Governance</text>
  <rect x="851" y="192" width="288" height="122" rx="5" fill="#ffffff" stroke="#d8e0e8" stroke-width="1"/>
  <text x="870" y="228" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700" fill="#102033">TCP Frame</text>
  <rect x="870" y="246" width="80" height="28" rx="3" fill="#fff7eb" stroke="#d9861c" stroke-width="1"/>
  <text x="910" y="264" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="8" fill="#102033">4B Length</text>
  <rect x="950" y="246" width="158" height="28" rx="3" fill="#ffffff" stroke="#294766" stroke-width="1"/>
  <text x="1029" y="264" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="8" fill="#102033">JSON Payload</text>

  <rect x="851" y="342" width="288" height="138" rx="5" fill="#ffffff" stroke="#d8e0e8" stroke-width="1"/>
  <text x="870" y="378" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700" fill="#102033">MCP Gateway</text>
  <text x="870" y="404" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#53616f">TTL cache, request coalescing</text>
  <text x="870" y="426" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#53616f">per-method rate limit</text>
  <text x="870" y="448" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#53616f">circuit breaker and metrics</text>

  <text x="851" y="526" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700" fill="#102033">Evaluation Placeholders</text>
  <rect x="851" y="548" width="132" height="108" rx="5" fill="#ffffff" stroke="#d8e0e8" stroke-width="1"/>
  <text x="917" y="575" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#53616f">upstream calls</text>
  <line x1="878" y1="628" x2="958" y2="628" stroke="#53616f" stroke-width="1"/>
  <rect x="888" y="600" width="18" height="28" fill="#c84a4a"/>
  <rect x="928" y="618" width="18" height="10" fill="#148ba5"/>
  <rect x="1007" y="548" width="132" height="108" rx="5" fill="#ffffff" stroke="#d8e0e8" stroke-width="1"/>
  <text x="1073" y="575" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#53616f">latency</text>
  <polyline points="1032,624 1060,610 1086,586 1114,582" fill="none" stroke="#148ba5" stroke-width="2"/>
  <polyline points="1032,594 1060,596 1086,598 1114,600" fill="none" stroke="#c84a4a" stroke-width="2" stroke-dasharray="3 2"/>

  <rect x="851" y="686" width="288" height="70" rx="5" fill="#ffffff" stroke="#d8e0e8" stroke-width="1"/>
  <text x="870" y="728" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#53616f">QR / GitHub / screenshots placeholder</text>
</svg>
