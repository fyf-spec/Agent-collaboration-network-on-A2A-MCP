<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="860" viewBox="0 0 1500 860">
  <title>MCP Gateway Governance Layer</title>
  <desc>Editable SVG showing MCP Gateway routing, caching, request coalescing, rate limiting, circuit breaking, and metrics.</desc>
  <rect width="1500" height="860" fill="#ffffff"/>
  <text x="58" y="70" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700" fill="#102033">MCP Gateway: Communication Governance Layer</text>
  <text x="58" y="108" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#53616f">Agent-to-MCP JSON-RPC semantics are preserved while repeated calls, overload, and failures are governed centrally</text>

  <rect x="60" y="158" width="250" height="430" rx="10" fill="#f7fafc" stroke="#d8e0e8" stroke-width="2"/>
  <text x="185" y="198" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#102033">Agents</text>
  <rect x="96" y="236" width="178" height="44" rx="7" fill="#e9f7fb" stroke="#148ba5" stroke-width="1.8"/>
  <text x="185" y="264" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" fill="#102033">Weather Agent</text>
  <rect x="96" y="302" width="178" height="44" rx="7" fill="#e9f7fb" stroke="#148ba5" stroke-width="1.8"/>
  <text x="185" y="330" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" fill="#102033">Attraction Agent</text>
  <rect x="96" y="368" width="178" height="44" rx="7" fill="#e9f7fb" stroke="#148ba5" stroke-width="1.8"/>
  <text x="185" y="396" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" fill="#102033">Hotel Agent</text>
  <rect x="96" y="434" width="178" height="44" rx="7" fill="#e9f7fb" stroke="#148ba5" stroke-width="1.8"/>
  <text x="185" y="462" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" fill="#102033">Traffic Agent</text>
  <rect x="96" y="500" width="178" height="44" rx="7" fill="#e9f7fb" stroke="#148ba5" stroke-width="1.8"/>
  <text x="185" y="528" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" fill="#102033">Packing Agent</text>

  <rect x="470" y="142" width="520" height="500" rx="12" fill="#fff7eb" stroke="#d9861c" stroke-width="2.8"/>
  <text x="730" y="190" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="#102033">MCP Gateway</text>
  <text x="730" y="221" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#53616f">single network governance point for JSON-RPC calls</text>

  <rect x="518" y="258" width="190" height="76" rx="8" fill="#ffffff" stroke="#d8e0e8" stroke-width="2"/>
  <text x="613" y="290" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#102033">Method Routing</text>
  <text x="613" y="316" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#53616f">method to MCP server</text>

  <rect x="752" y="258" width="190" height="76" rx="8" fill="#ffffff" stroke="#d8e0e8" stroke-width="2"/>
  <text x="847" y="290" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#102033">TTL Cache</text>
  <text x="847" y="316" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#53616f">semantic params key</text>

  <rect x="518" y="374" width="190" height="76" rx="8" fill="#ffffff" stroke="#d8e0e8" stroke-width="2"/>
  <text x="613" y="406" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#102033">Coalescing</text>
  <text x="613" y="432" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#53616f">one upstream call</text>

  <rect x="752" y="374" width="190" height="76" rx="8" fill="#ffffff" stroke="#d8e0e8" stroke-width="2"/>
  <text x="847" y="406" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#102033">Rate Limit</text>
  <text x="847" y="432" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#53616f">per-method concurrency</text>

  <rect x="518" y="490" width="190" height="76" rx="8" fill="#ffffff" stroke="#d8e0e8" stroke-width="2"/>
  <text x="613" y="522" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#102033">Circuit Breaker</text>
  <text x="613" y="548" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#53616f">fail fast on outage</text>

  <rect x="752" y="490" width="190" height="76" rx="8" fill="#ffffff" stroke="#d8e0e8" stroke-width="2"/>
  <text x="847" y="522" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#102033">Metrics</text>
  <text x="847" y="548" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#53616f">/metrics endpoint</text>

  <rect x="1158" y="158" width="250" height="430" rx="10" fill="#f7fafc" stroke="#d8e0e8" stroke-width="2"/>
  <text x="1283" y="198" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#102033">MCP Servers</text>
  <rect x="1194" y="236" width="178" height="44" rx="7" fill="#ffffff" stroke="#8da0b4" stroke-width="1.8"/>
  <text x="1283" y="264" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" fill="#102033">Weather MCP</text>
  <rect x="1194" y="302" width="178" height="44" rx="7" fill="#ffffff" stroke="#8da0b4" stroke-width="1.8"/>
  <text x="1283" y="330" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" fill="#102033">Attraction MCP</text>
  <rect x="1194" y="368" width="178" height="44" rx="7" fill="#ffffff" stroke="#8da0b4" stroke-width="1.8"/>
  <text x="1283" y="396" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" fill="#102033">Hotel MCP</text>
  <rect x="1194" y="434" width="178" height="44" rx="7" fill="#ffffff" stroke="#8da0b4" stroke-width="1.8"/>
  <text x="1283" y="462" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" fill="#102033">Traffic MCP</text>
  <rect x="1194" y="500" width="178" height="44" rx="7" fill="#ffffff" stroke="#8da0b4" stroke-width="1.8"/>
  <text x="1283" y="528" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" fill="#102033">Packing MCP</text>

  <line x1="310" y1="373" x2="458" y2="373" stroke="#148ba5" stroke-width="3"/>
  <polygon points="458,373 442,364 442,382" fill="#148ba5"/>
  <text x="384" y="352" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#148ba5">HTTP/JSON-RPC</text>
  <text x="384" y="397" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#53616f">duplicate calls collapse</text>

  <line x1="990" y1="373" x2="1146" y2="373" stroke="#d9861c" stroke-width="3"/>
  <polygon points="1146,373 1130,364 1130,382" fill="#d9861c"/>
  <text x="1068" y="352" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#d9861c">routed upstream</text>
  <text x="1068" y="397" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#53616f">fewer calls, lower latency</text>

  <rect x="82" y="688" width="1300" height="94" rx="10" fill="#ffffff" stroke="#d8e0e8" stroke-width="2"/>
  <text x="112" y="729" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#102033">Metrics exposed by Gateway:</text>
  <text x="380" y="729" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#53616f">total_requests</text>
  <text x="535" y="729" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#53616f">upstream_calls</text>
  <text x="700" y="729" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#53616f">cache_hits</text>
  <text x="830" y="729" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#53616f">coalesced_requests</text>
  <text x="1055" y="729" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#53616f">avg_latency_ms</text>
  <text x="1230" y="729" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#53616f">error_count</text>
  <line x1="112" y1="748" x2="1300" y2="748" stroke="#d8e0e8" stroke-width="1.5"/>
  <text x="112" y="766" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#53616f">Poster chart placeholder: baseline repeated requests vs gateway cache/coalescing, showing upstream call reduction and latency reduction.</text>
</svg>
