  <polygon points="1410,323 1393,315 1397,331" fill="#d9861c"/>
  <line x1="1360" y1="315" x2="1410" y2="396" stroke="#d9861c" stroke-width="2.5"/>
  <polygon points="1410,396 1396,384 1393,401" fill="#d9861c"/>
  <line x1="1360" y1="325" x2="1410" y2="469" stroke="#d9861c" stroke-width="2.5"/>
  <polygon points="1410,469 1398,456 1393,473" fill="#d9861c"/>

  <line x1="474" y1="106" x2="495" y2="151" stroke="#8da0b4" stroke-width="2.5"/>
  <polygon points="495,151 482,139 478,153" fill="#8da0b4"/>
  <line x1="583" y1="106" x2="555" y2="151" stroke="#8da0b4" stroke-width="2.5"/>
  <polygon points="555,151 570,143 558,136" fill="#8da0b4"/>
  <text x="524" y="132" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#53616f">HTTP/REST discovery</text>

  <line x1="524" y1="278" x2="524" y2="578" stroke="#148ba5" stroke-width="2" stroke-dasharray="7 6"/>
  <line x1="1240" y1="364" x2="1240" y2="578" stroke="#d9861c" stroke-width="2" stroke-dasharray="7 6"/>
  <line x1="1332" y1="530" x2="1332" y2="578" stroke="#5c6b7a" stroke-width="2" stroke-dasharray="7 6"/>
</svg>
