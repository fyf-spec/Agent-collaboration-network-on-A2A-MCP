<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <title>Governed A2A-MCP Architecture Overview</title>
  <desc>Editable SVG architecture diagram for a governed A2A and MCP multi-agent communication network.</desc>
  <rect width="1600" height="900" fill="#ffffff"/>
  <text x="60" y="70" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="700" fill="#102033">Governed A2A-MCP Multi-Agent Communication Network</text>
  <text x="60" y="108" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#53616f">Travel-planning demo with data plane, control plane, governance plane, and observability plane</text>

  <rect x="52" y="132" width="1496" height="704" rx="10" fill="#f7fafc" stroke="#d8e0e8" stroke-width="2"/>

  <rect x="88" y="172" width="200" height="94" rx="8" fill="#ffffff" stroke="#294766" stroke-width="2"/>
  <text x="188" y="207" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#102033">User</text>
  <text x="188" y="236" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#53616f">travel query</text>

  <rect x="396" y="160" width="256" height="118" rx="8" fill="#e9f7fb" stroke="#148ba5" stroke-width="2.5"/>
  <text x="524" y="200" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#102033">Coordinator</text>
  <text x="524" y="230" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#53616f">DAG scheduling</text>
  <text x="524" y="252" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#53616f">task aggregation</text>

  <rect x="382" y="42" width="126" height="64" rx="7" fill="#ffffff" stroke="#8da0b4" stroke-width="2"/>
  <text x="445" y="73" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" fill="#102033">Primary</text>
  <text x="445" y="94" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#53616f">Registry</text>

  <rect x="540" y="42" width="126" height="64" rx="7" fill="#ffffff" stroke="#8da0b4" stroke-width="2"/>
  <text x="603" y="73" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" fill="#102033">Backup</text>
  <text x="603" y="94" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#53616f">Registry</text>

  <rect x="765" y="146" width="262" height="332" rx="10" fill="#ffffff" stroke="#d8e0e8" stroke-width="2"/>
  <text x="896" y="184" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#102033">Agent Pool</text>
  <text x="896" y="211" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#53616f">independent worker processes</text>

  <rect x="802" y="238" width="188" height="38" rx="7" fill="#f3fbfd" stroke="#148ba5" stroke-width="1.7"/>
  <text x="896" y="263" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" fill="#102033">Weather Agent</text>
  <rect x="802" y="292" width="188" height="38" rx="7" fill="#f3fbfd" stroke="#148ba5" stroke-width="1.7"/>
  <text x="896" y="317" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" fill="#102033">Attraction Agent</text>
  <rect x="802" y="346" width="188" height="38" rx="7" fill="#f3fbfd" stroke="#148ba5" stroke-width="1.7"/>
  <text x="896" y="371" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" fill="#102033">Hotel Agent</text>
  <rect x="802" y="400" width="188" height="38" rx="7" fill="#f3fbfd" stroke="#148ba5" stroke-width="1.7"/>
  <text x="896" y="425" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" fill="#102033">Traffic Agent</text>
  <rect x="802" y="454" width="188" height="38" rx="7" fill="#f3fbfd" stroke="#148ba5" stroke-width="1.7"/>
  <text x="896" y="479" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" fill="#102033">Packing Agent</text>

  <rect x="1120" y="226" width="240" height="138" rx="10" fill="#fff7eb" stroke="#d9861c" stroke-width="2.5"/>
