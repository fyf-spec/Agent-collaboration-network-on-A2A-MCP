  <text x="1240" y="299" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#53616f">routing / cache</text>
  <text x="1240" y="321" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#53616f">coalescing / metrics</text>
  <text x="1240" y="343" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#53616f">rate limit / circuit breaker</text>

  <rect x="1420" y="153" width="96" height="48" rx="6" fill="#ffffff" stroke="#8da0b4" stroke-width="1.8"/>
  <text x="1468" y="183" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" fill="#102033">Weather MCP</text>
  <rect x="1420" y="226" width="96" height="48" rx="6" fill="#ffffff" stroke="#8da0b4" stroke-width="1.8"/>
  <text x="1468" y="256" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" fill="#102033">Attract MCP</text>
  <rect x="1420" y="299" width="96" height="48" rx="6" fill="#ffffff" stroke="#8da0b4" stroke-width="1.8"/>
  <text x="1468" y="329" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" fill="#102033">Hotel MCP</text>
  <rect x="1420" y="372" width="96" height="48" rx="6" fill="#ffffff" stroke="#8da0b4" stroke-width="1.8"/>
  <text x="1468" y="402" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" fill="#102033">Traffic MCP</text>
  <rect x="1420" y="445" width="96" height="48" rx="6" fill="#ffffff" stroke="#8da0b4" stroke-width="1.8"/>
  <text x="1468" y="475" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" fill="#102033">Packing MCP</text>

  <rect x="86" y="590" width="320" height="150" rx="10" fill="#ffffff" stroke="#d8e0e8" stroke-width="2"/>
  <text x="246" y="628" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="700" fill="#102033">Control Plane</text>
  <text x="246" y="660" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#53616f">Agent registration</text>
  <text x="246" y="684" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#53616f">capability discovery</text>
  <text x="246" y="708" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#53616f">primary-backup failover</text>

  <rect x="448" y="590" width="320" height="150" rx="10" fill="#ffffff" stroke="#d8e0e8" stroke-width="2"/>
  <text x="608" y="628" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="700" fill="#102033">Data Plane</text>
  <text x="608" y="660" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#53616f">A2A TCP dispatch</text>
  <text x="608" y="684" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#53616f">Length-prefixed JSON frames</text>
  <text x="608" y="708" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#53616f">TASK_REQUEST / TASK_RESULT</text>

  <rect x="810" y="590" width="320" height="150" rx="10" fill="#ffffff" stroke="#d8e0e8" stroke-width="2"/>
  <text x="970" y="628" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="700" fill="#102033">Governance Plane</text>
  <text x="970" y="660" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#53616f">Gateway routing</text>
  <text x="970" y="684" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#53616f">cache + request coalescing</text>
  <text x="970" y="708" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#53616f">rate limit + circuit breaker</text>

  <rect x="1172" y="590" width="320" height="150" rx="10" fill="#ffffff" stroke="#d8e0e8" stroke-width="2"/>
  <text x="1332" y="628" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="700" fill="#102033">Observability Plane</text>
  <text x="1332" y="660" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#53616f">trace_id / span_id</text>
  <text x="1332" y="684" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#53616f">packet logs + protocol payloads</text>
  <text x="1332" y="708" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#53616f">Streamlit topology UI</text>

