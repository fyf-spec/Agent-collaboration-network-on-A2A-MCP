  <line x1="652" y1="219" x2="755" y2="219" stroke="#148ba5" stroke-width="3"/>
  <polygon points="755,219 740,211 740,227" fill="#148ba5"/>
  <text x="704" y="203" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#148ba5">A2A TCP</text>

  <line x1="1027" y1="305" x2="1110" y2="305" stroke="#d9861c" stroke-width="3"/>
  <polygon points="1110,305 1095,297 1095,313" fill="#d9861c"/>
  <text x="1068" y="289" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#d9861c">JSON-RPC</text>

