  <text x="404" y="523" class="h1">6. A2A TCP 应用层协议</text>
  <rect x="404" y="535" width="381" height="112" rx="6" class="box"/>
  <text x="424" y="560" class="body">TCP 是字节流，没有天然消息边界；系统在 A2A 数据面定义 Length-Prefix JSON frame。</text>
  <rect x="433" y="586" width="85" height="34" rx="4" fill="#fff7eb" stroke="#d9861c" stroke-width="0.9"/>
  <text x="475.5" y="600" text-anchor="middle" class="label">Length</text>
  <text x="475.5" y="613" text-anchor="middle" class="tiny">4 bytes, big endian</text>
  <rect x="518" y="586" width="203" height="34" rx="4" fill="#ffffff" stroke="#294766" stroke-width="0.9"/>
  <text x="619.5" y="600" text-anchor="middle" class="label">UTF-8 JSON Payload</text>
  <text x="619.5" y="613" text-anchor="middle" class="tiny">version, type, trace_id, span_id, source, target, task_id, payload</text>
  <text x="424" y="636" class="mono">recv_exact(4)  →  parse length  →  recv_exact(length)  →  validate A2A envelope</text>

  <text x="404" y="677" class="h1">7. 端到端任务执行流</text>
  <rect x="404" y="689" width="381" height="89" rx="6" class="box"/>
  <rect x="422" y="715" width="52" height="32" rx="4" class="blueBox"/>
  <text x="448" y="735" text-anchor="middle" class="tiny">Submit</text>
  <rect x="493" y="715" width="52" height="32" rx="4" class="box"/>
  <text x="519" y="735" text-anchor="middle" class="tiny">DAG</text>
  <rect x="564" y="715" width="52" height="32" rx="4" class="blueBox"/>
  <text x="590" y="735" text-anchor="middle" class="tiny">A2A TCP</text>
  <rect x="635" y="715" width="52" height="32" rx="4" class="orangeBox"/>
  <text x="661" y="735" text-anchor="middle" class="tiny">Gateway</text>
  <rect x="706" y="715" width="52" height="32" rx="4" class="box"/>
  <text x="732" y="735" text-anchor="middle" class="tiny">Final Plan</text>
  <line x1="474" y1="731" x2="493" y2="731" class="line"/><polygon points="493,731 487,727 487,735" class="navy"/>
  <line x1="545" y1="731" x2="564" y2="731" class="line"/><polygon points="564,731 558,727 558,735" class="navy"/>
  <line x1="616" y1="731" x2="635" y2="731" class="line"/><polygon points="635,731 629,727 629,735" class="navy"/>
  <line x1="687" y1="731" x2="706" y2="731" class="line"/><polygon points="706,731 700,727 700,735" class="navy"/>
  <text x="424" y="766" class="tiny">默认 DAG：Weather → Attraction → Hotel → Traffic；Packing 依赖 Weather，可并行补充行李建议。</text>

  <!-- RIGHT COLUMN -->
