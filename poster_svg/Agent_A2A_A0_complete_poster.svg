  <text x="701.5" y="276" text-anchor="middle" class="tiny">Attraction</text>
  <rect x="668" y="289" width="67" height="19" rx="3" fill="#ffffff" stroke="#148ba5" stroke-width="0.7"/>
  <text x="701.5" y="302" text-anchor="middle" class="tiny">Hotel</text>
  <rect x="668" y="315" width="67" height="19" rx="3" fill="#ffffff" stroke="#148ba5" stroke-width="0.7"/>
