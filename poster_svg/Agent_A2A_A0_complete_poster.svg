  <text x="843" y="699" class="h1">11. 评测指标与验收点</text>
  <rect x="843" y="711" width="302" height="67" rx="5" class="box"/>
  <rect x="862" y="731" width="72" height="30" rx="4" fill="#f7fafc" stroke="#d8e0e8" stroke-width="0.6"/>
