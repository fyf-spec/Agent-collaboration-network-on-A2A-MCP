  <text x="456" y="370" text-anchor="middle" class="tiny">Attraction</text>
  <text x="456" y="385" text-anchor="middle" class="tiny">Hotel</text>
  <text x="456" y="400" text-anchor="middle" class="tiny">Traffic</text>
  <text x="456" y="415" text-anchor="middle" class="tiny">Packing</text>

  <rect x="638" y="421" width="125" height="46" rx="5" class="box"/>
  <text x="700.5" y="442" text-anchor="middle" class="label">Observability</text>
  <text x="700.5" y="457" text-anchor="middle" class="tiny">trace_id / span_id / packet log</text>

  <!-- architecture arrows -->
  <line x1="486" y1="228" x2="520" y2="228" class="line"/>
