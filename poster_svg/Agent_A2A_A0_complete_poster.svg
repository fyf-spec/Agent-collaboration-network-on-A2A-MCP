  <text x="59" y="52" text-anchor="middle" class="small">校徽</text>
  <text x="59" y="66" text-anchor="middle" class="tiny">School Logo</text>
  <text x="112" y="40" class="title">面向 MCP 与 A2A 多智能体系统的可治理通信网络设计与实现</text>
  <text x="113" y="63" class="subtitle">A Governed A2A-MCP Communication Network for Distributed Multi-Agent Travel Planning</text>
  <text x="113" y="82" class="subtitle">封宇凡、徐日晞、余安恒、吴宁凯  ·  计算机网络大作业 题目二：基于 MCP 与 A2A 协议的分布式多智能体协同网络</text>
  <rect x="1010" y="24" width="144" height="54" rx="4" fill="#f7fafc" stroke="#cbd6e2" stroke-width="0.9" stroke-dasharray="5 4"/>
  <text x="1082" y="47" text-anchor="middle" class="small">GitHub / Demo QR</text>
  <text x="1082" y="61" text-anchor="middle" class="tiny">预留二维码栏</text>
  <line x1="24" y1="112" x2="1165" y2="112" stroke="#d8e0e8" stroke-width="1.2"/>

  <!-- Column backgrounds -->
  <rect x="24" y="126" width="342" height="684" rx="8" class="panel"/>
  <rect x="384" y="126" width="421" height="684" rx="8" class="box"/>
  <rect x="823" y="126" width="342" height="684" rx="8" class="panel"/>

  <!-- LEFT COLUMN -->
  <text x="44" y="153" class="h1">1. 课程问题与设计动机</text>
  <rect x="44" y="164" width="302" height="91" rx="5" class="box"/>
  <text x="58" y="185" class="body">题目二要求构建独立进程运行的多智能体系统：</text>
  <text x="62" y="202" class="body">• MCP 工具服务器采用 HTTP/JSON-RPC 2.0；</text>
  <text x="62" y="217" class="body">• A2A 必须通过网络传递结构化 JSON 报文；</text>
  <text x="62" y="232" class="body">• 控制台或 UI 需展示每一次 HTTP/TCP 收发路径、端口与 Payload；</text>
  <text x="62" y="247" class="body">• 扩展项鼓励原生 TCP A2A、注册中心、容错和通信效率优化。</text>

  <text x="44" y="286" class="h1">2. Baseline 痛点与对应改造</text>
  <rect x="44" y="298" width="302" height="158" rx="5" class="box"/>
  <rect x="56" y="314" width="130" height="24" rx="3" fill="#f7fafc" stroke="#d8e0e8" stroke-width="0.6"/>
  <rect x="195" y="314" width="138" height="24" rx="3" fill="#f7fafc" stroke="#d8e0e8" stroke-width="0.6"/>
  <text x="121" y="330" text-anchor="middle" class="label">痛点</text>
  <text x="264" y="330" text-anchor="middle" class="label">本项目实现</text>
  <text x="62" y="356" class="body">Agent 地址与能力写死</text>
  <text x="202" y="356" class="body">主/备 Registry + 动态发现</text>
  <text x="62" y="382" class="body">HTTP A2A 不体现应用层协议</text>
  <text x="202" y="382" class="body">4B Length + JSON 的 TCP Frame</text>
  <text x="62" y="408" class="body">重复 MCP 调用放大上游负载</text>
  <text x="202" y="408" class="body">Gateway 缓存 + 请求合并</text>
  <text x="62" y="434" class="body">故障会拖慢或卡死链路</text>
  <text x="202" y="434" class="body">Timeout + 熔断 + partial 输出</text>

  <text x="44" y="487" class="h1">3. 核心贡献</text>
  <rect x="44" y="499" width="302" height="150" rx="5" class="box"/>
  <rect x="58" y="516" width="132" height="44" rx="4" class="blueBox"/>
  <text x="124" y="535" text-anchor="middle" class="label">Data Plane</text>
  <text x="124" y="551" text-anchor="middle" class="small">A2A TCP 分帧通信</text>
  <rect x="200" y="516" width="132" height="44" rx="4" class="box"/>
  <text x="266" y="535" text-anchor="middle" class="label">Control Plane</text>
  <text x="266" y="551" text-anchor="middle" class="small">注册中心与主备切换</text>
  <rect x="58" y="579" width="132" height="44" rx="4" class="orangeBox"/>
  <text x="124" y="598" text-anchor="middle" class="label">Governance Plane</text>
  <text x="124" y="614" text-anchor="middle" class="small">MCP Gateway 通信治理</text>
  <rect x="200" y="579" width="132" height="44" rx="4" class="box"/>
  <text x="266" y="598" text-anchor="middle" class="label">Observability Plane</text>
  <text x="266" y="614" text-anchor="middle" class="small">Trace / Metrics / 报文日志</text>
  <text x="58" y="643" class="tiny">实际实现扩展到五类 Agent：Weather、Attraction、Hotel、Traffic、Packing。</text>

  <text x="44" y="680" class="h1">4. 仓库实现概览</text>
  <rect x="44" y="692" width="302" height="86" rx="5" class="box"/>
  <text x="60" y="713" class="body">核心进程：Coordinator、Primary/Backup Registry、MCP Gateway、5 个 Agent、5 个 MCP Server。</text>
  <text x="60" y="733" class="body">UI Demo：Streamlit 实时展示拓扑、节点启停、链路动画、失败链路、网络事件和完整协议内容。</text>
  <text x="60" y="753" class="body">测试覆盖：连续帧/分片帧、TASK_RESULT ACK、A2A 限流错误、LLM 429 fallback。</text>

  <!-- CENTER COLUMN: ARCHITECTURE -->
  <text x="404" y="153" class="h1">5. 系统架构：数据面 + 控制面 + 治理面</text>
  <rect x="404" y="164" width="381" height="330" rx="6" fill="#ffffff" stroke="#d8e0e8" stroke-width="0.9"/>

